<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNL Italy Major 2026 — Women's Draw</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a18;
  --bg2:#0f0f22;
  --bg3:#15152e;
  --bg4:#1c1c38;
  --bg5:#242448;
  --text:#e8e4f8;
  --text2:#9890c0;
  --text3:#5c5680;
  --border:rgba(180,160,255,0.10);
  --border2:rgba(180,160,255,0.20);
  --border3:rgba(180,160,255,0.35);
  --acc:#7c5cbf;
  --acc2:#9b7de0;
  --acc3:#b8a0f0;
  --gold:#f5c842;
  --gold2:#d4a820;
  --win-bg:#1e163d;
  --win-border:#7c5cbf;
  --win-text:#c0a8ff;
  --elim-text:#3d395c;
  --champ-bg:#2a1f00;
  --champ-border:#f5c842;
  --champ-text:#f5c842;
  --court-central:#f5c842;
  --court-pietr:#5b9aef;
  --court-c6:#e060b0;
  --font-main:'Barlow',sans-serif;
  --font-cond:'Barlow Condensed',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-main);}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:54px;background:rgba(10,10,24,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 20px;gap:14px;}
.tb-logo{font-family:var(--font-cond);font-size:22px;font-weight:800;letter-spacing:0.12em;color:var(--gold);text-transform:uppercase;}
.tb-sub{font-size:10px;color:var(--text2);letter-spacing:0.16em;text-transform:uppercase;margin-top:1px;}
.tb-badge{background:rgba(180,160,255,0.12);border:1px solid var(--border2);border-radius:12px;padding:3px 10px;font-family:var(--font-cond);font-size:11px;font-weight:600;letter-spacing:0.1em;color:var(--acc3);text-transform:uppercase;}
.tb-sep{width:1px;height:28px;background:var(--border2);}
.tb-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
#zoom-val{font-size:11px;color:var(--text2);min-width:36px;text-align:center;font-family:var(--font-cond);}
.tb-btn{background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:5px 12px;font-family:var(--font-cond);font-size:12px;font-weight:600;letter-spacing:0.08em;cursor:pointer;transition:all 0.15s;}
.tb-btn:hover{background:var(--bg5);border-color:var(--acc);}

/* SEEDS PANEL */
#seeds-panel{position:fixed;top:54px;left:0;right:0;z-index:190;background:var(--bg2);border-bottom:1px solid var(--border2);padding:14px 20px 16px;transition:transform 0.3s ease;}
.seeds-title{font-family:var(--font-cond);font-size:11px;font-weight:700;letter-spacing:0.18em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.seeds-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
.seed-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;transition:border-color 0.15s;}
.seed-card:hover{border-color:var(--border2);}
.seed-card.s1{border-color:var(--gold2);background:rgba(245,200,66,0.06);}
.seed-rank{font-family:var(--font-cond);font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.1em;margin-bottom:3px;}
.seed-card.s1 .seed-rank{color:var(--gold);}
.seed-names{font-family:var(--font-cond);font-size:12px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px;}
.seed-pts{font-size:10px;color:var(--text2);font-weight:500;}
.seed-top-badge{display:inline-block;background:var(--gold);color:#000;font-family:var(--font-cond);font-size:9px;font-weight:800;letter-spacing:0.12em;padding:1px 6px;border-radius:3px;margin-top:3px;}
.seed-gap{display:inline-block;background:rgba(245,200,66,0.12);border:1px solid rgba(245,200,66,0.25);color:var(--gold);font-family:var(--font-cond);font-size:9px;font-weight:700;letter-spacing:0.06em;padding:1px 6px;border-radius:3px;margin-top:3px;}

/* SCROLL */
#scroll-wrap{position:fixed;left:0;right:0;bottom:0;overflow:auto;background:var(--bg);}
#bracket-outer{display:flex;align-items:stretch;padding:30px 24px 50px;gap:0;min-width:max-content;}

/* COLUMNS */
.col{display:flex;flex-direction:column;gap:0;}
.col-label{font-family:var(--font-cond);font-size:10px;font-weight:700;letter-spacing:0.18em;color:var(--text3);text-transform:uppercase;text-align:center;margin-bottom:12px;padding:0 4px;}
.col-inner{flex:1;display:flex;flex-direction:column;}
.connector{flex-shrink:0;}

/* MATCH WRAP */
.match-wrap{display:flex;flex-direction:column;flex:1;justify-content:center;padding:6px 0;}

/* MATCH CARDS */
.match-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;width:190px;transition:border-color 0.15s;}
.match-card:hover{border-color:var(--border2);}
.match-card.r16-locked{}
.match-meta{display:flex;align-items:center;gap:6px;padding:5px 8px 4px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
.court-badge{font-family:var(--font-cond);font-size:9px;font-weight:700;letter-spacing:0.1em;padding:2px 6px;border-radius:3px;text-transform:uppercase;}
.court-central{background:rgba(245,200,66,0.15);color:var(--court-central);border:1px solid rgba(245,200,66,0.25);}
.court-pietr{background:rgba(91,154,239,0.15);color:var(--court-pietr);border:1px solid rgba(91,154,239,0.25);}
.court-c6{background:rgba(224,96,176,0.15);color:var(--court-c6);border:1px solid rgba(224,96,176,0.25);}
.match-time{font-family:var(--font-cond);font-size:10px;font-weight:600;color:var(--text2);margin-left:auto;}

/* TEAM ROWS */
.team-row{display:flex;align-items:center;padding:7px 8px;cursor:pointer;transition:background 0.12s;border-bottom:1px solid var(--border);min-height:36px;}
.team-row:last-child{border-bottom:none;}
.team-row:hover{background:rgba(180,160,255,0.07);}
.team-row.winner{background:var(--win-bg);}
.team-row.winner:hover{background:rgba(30,22,61,0.9);}
.team-row.eliminated{opacity:0.45;cursor:default;}
.team-row.eliminated:hover{background:none;}
.team-row.champion{background:var(--champ-bg);}
.team-row.champion:hover{background:rgba(42,31,0,0.9);}
.team-row.tbd{cursor:default;}
.team-row.tbd:hover{background:none;}
.team-row.locked{cursor:default;}
.team-row.locked:hover{background:none;}
.team-row.winner.locked:hover{background:var(--win-bg);}
.seed-num{font-family:var(--font-cond);font-size:10px;font-weight:700;color:var(--text3);width:18px;flex-shrink:0;}
.team-row.winner .seed-num{color:var(--acc2);}
.team-row.champion .seed-num{color:var(--gold);}
.team-names{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.t-name1,.t-name2{font-family:var(--font-cond);font-size:12px;font-weight:600;letter-spacing:0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);line-height:1.25;}
.team-row.winner .t-name1,.team-row.winner .t-name2{color:var(--win-text);}
.team-row.eliminated .t-name1,.team-row.eliminated .t-name2{color:var(--elim-text);}
.team-row.champion .t-name1,.team-row.champion .t-name2{color:var(--champ-text);}
.team-row.tbd .t-name1{color:var(--text3);font-style:italic;}
.win-check{width:14px;height:14px;flex-shrink:0;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;}
.team-row.champion .win-check{background:var(--gold);color:#000;}
.trophy-icon{font-size:14px;margin-left:4px;}

/* FINAL CARD */
.final-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;width:200px;flex-shrink:0;padding:0 4px;}
.final-label{font-family:var(--font-cond);font-size:10px;font-weight:700;letter-spacing:0.18em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;}
.final-card{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;overflow:hidden;width:192px;box-shadow:0 0 30px rgba(124,92,191,0.12);}
.final-card.has-champ{border-color:var(--gold2);box-shadow:0 0 40px rgba(245,200,66,0.2);}
.final-header{background:var(--bg4);padding:8px 10px;border-bottom:1px solid var(--border2);font-family:var(--font-cond);font-size:11px;font-weight:700;letter-spacing:0.16em;color:var(--text3);text-transform:uppercase;text-align:center;}
.final-header.crowned{color:var(--gold);}
</style>
</head>
<body>

<div id="topbar">
  <div>
    <div class="tb-logo">Italy Major 2026</div>
    <div class="tb-sub">Rome · 31 May – 7 Jun · € 1,044,849</div>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-badge">Women's Draw · Quarterfinals</div>
  <div class="tb-right">
    <button class="tb-btn" onclick="zoomBracket(-0.1)">−</button>
    <span id="zoom-val">100%</span>
    <button class="tb-btn" onclick="zoomBracket(0.1)">+</button>
    <button class="tb-btn" onclick="resetAll()">↺ Reset</button>
    <button class="tb-btn" id="seeds-toggle-btn" onclick="toggleSeeds()">▲ Seeds</button>
  </div>
</div>

<div id="seeds-panel">
  <div class="seeds-title">Seeded Teams · Women</div>
  <div class="seeds-grid" id="seeds-grid"></div>
</div>

<div id="scroll-wrap">
  <div id="bracket-outer"></div>
</div>

<script>
const C_CENTRAL='central', C_PIETR='pietr', C_C6='c6';

const SEEDS=[
  {rank:1,  names:["G. Triay Pons","D. Brea Senesi"],              pts:36018},
  {rank:2,  names:["P. Josemaria Martin","B. Gonzalez Fernandez"],  pts:30751},
  {rank:3,  names:["A. Sanchez Fallada","A. Ustero Prieto"],        pts:21531},
  {rank:4,  names:["C. Fernandez Sanchez","S. Araujo"],             pts:19461},
  {rank:5,  names:["T. Icardo Alcorisa","C. Jensen"],               pts:12109},
  {rank:6,  names:["M. Ortega Gallego","M. Calvo"],                 pts:11176},
  {rank:7,  names:["A. Salazar Bengoechea","A. Alonso De Villa"],   pts:10058},
  {rank:8,  names:["M. Guinart España","V. Virseda"],               pts:8288},
  {rank:9,  names:["B. Caldera Sanchez","C. Goenaga Garcia"],       pts:7404},
  {rank:10, names:["A. Osoro Ulrich","V. Iglesias Segador"],        pts:7031},
  {rank:11, names:["M. Fassio Goyeneche","R. Eugenio Barrera"],     pts:5154},
  {rank:12, names:["C. Orsi","P. Llaguno Zielinski"],               pts:4856},
  {rank:13, names:["L. Rufo Ortiz","J. Castello Lopez"],            pts:4664},
  {rank:14, names:["M. Barrera De La Fuente","J. Velasco Postiguillo"], pts:4156},
  {rank:15, names:["L. Sainz Pelegri","J. Montes Cabruja"],         pts:4154},
  {rank:16, names:["K. Sharifova","A. Collombon"],                  pts:3518},
];

// R16 — completed & locked
const R16=[
  // TOP HALF (indices 0–3)
  {teamA:{seed:1, p1:"G. Triay Pons",       p2:"D. Brea Senesi"},       teamB:{seed:0,  p1:"C. Escacena Montero",  p2:"P. Martinez Fortun"},      w:'A', court:C_CENTRAL, time:"R16 · 12:00 PM"},
  {teamA:{seed:16,p1:"K. Sharifova",         p2:"A. Collombon"},         teamB:{seed:5,  p1:"T. Icardo Alcorisa",   p2:"C. Jensen"},                w:'B', court:C_C6,     time:"R16 · 12:00 PM"},
  {teamA:{seed:0, p1:"N. Rodriguez Camacho", p2:"G. Dal Pozzo"},         teamB:{seed:12, p1:"C. Orsi",              p2:"P. Llaguno Zielinski"},     w:'A', court:C_PIETR,  time:"R16 · 1:30 PM"},
  {teamA:{seed:9, p1:"B. Caldera Sanchez",   p2:"C. Goenaga Garcia"},    teamB:{seed:4,  p1:"C. Fernandez Sanchez", p2:"S. Araujo"},                w:'B', court:C_PIETR,  time:"R16 · 12:00 PM"},
  // BOTTOM HALF (indices 4–7)
  {teamA:{seed:3, p1:"A. Sanchez Fallada",   p2:"A. Ustero Prieto"},     teamB:{seed:10, p1:"A. Osoro Ulrich",      p2:"V. Iglesias Segador"},      w:'A', court:C_CENTRAL,time:"R16 · 5:00 PM"},
  {teamA:{seed:0, p1:"N. Canovas Paredes",   p2:"M.E. Rodriguez Abajo"}, teamB:{seed:8,  p1:"M. Guinart España",    p2:"V. Virseda"},               w:'A', court:C_PIETR,  time:"R16 · 3:00 PM"},
  {teamA:{seed:6, p1:"M. Ortega Gallego",    p2:"M. Calvo"},             teamB:{seed:15, p1:"L. Sainz Pelegri",     p2:"J. Montes Cabruja"},        w:'A', court:C_PIETR,  time:"R16 · 5:00 PM"},
  {teamA:{seed:11,p1:"M. Fassio Goyeneche",  p2:"R. Eugenio Barrera"},   teamB:{seed:2,  p1:"P. Josemaria Martin",  p2:"B. Gonzalez Fernandez"},    w:'B', court:C_CENTRAL,time:"R16 · 3:00 PM"},
];

function r16W(i){ const m=R16[i]; return m.w==='A'?m.teamA:m.teamB; }

// QF — from Order of Play, Friday 5 June 2026
// TOP HALF
// qf0: [1] Triay/Brea Senesi vs [5] Icardo/Jensen       — Campo Centrale 10:00 AM
// qf1: N. Rodriguez/Dal Pozzo vs [4] Fernandez/Araujo   — Pietrangeli    12:00 PM
// BOTTOM HALF
// qf2: [3] Sanchez Fallada/Ustero vs [14] Barrera/Velasco — Campo Centrale 5:00 PM
// qf3: [6] Ortega/Calvo vs [2] Josemaria/Gonzalez         — Campo Centrale ~11:30 AM (followed by)
const QF=[
  {id:'qf0', teamA:r16W(0), teamB:r16W(1), court:C_CENTRAL, time:"QF · 10:00 AM"},
  {id:'qf1', teamA:r16W(2), teamB:r16W(3), court:C_PIETR,   time:"QF · 12:00 PM"},
  {id:'qf2', teamA:r16W(4), teamB:r16W(5), court:C_CENTRAL, time:"QF · 5:00 PM"},
  {id:'qf3', teamA:r16W(6), teamB:r16W(7), court:C_CENTRAL, time:"QF · ~11:30 AM"},
];

const picks={};
QF.forEach(m=>picks[m.id]=null);
picks.sf0=null; picks.sf1=null; picks.fin=null;

// ── SEEDS ────────────────────────────────────────────────────────────────
function buildSeeds(){
  const g=document.getElementById('seeds-grid');
  g.innerHTML='';
  SEEDS.forEach((s,i)=>{
    const c=document.createElement('div');
    c.className='seed-card'+(i===0?' s1':'');
    const gap=i===0?null:SEEDS[i-1].pts-s.pts;
    c.innerHTML=`<div class="seed-rank">${s.rank}. Seeded</div>
      <div class="seed-names">${s.names[0]}<br>${s.names[1]}</div>
      <div class="seed-pts">${s.pts.toLocaleString()} pts</div>
      ${i===0?'<span class="seed-top-badge">TOP SEED</span>':`<span class="seed-gap">−${gap.toLocaleString()} to #${i}</span>`}`;
    g.appendChild(c);
  });
}

let seedsVisible=true;
function toggleSeeds(){
  seedsVisible=!seedsVisible;
  document.getElementById('seeds-panel').style.transform=seedsVisible?'':'translateY(-300px)';
  document.getElementById('seeds-toggle-btn').textContent=seedsVisible?'▲ Seeds':'▼ Seeds';
  updateTop();
}
function updateTop(){
  const sp=seedsVisible?document.getElementById('seeds-panel').offsetHeight:0;
  document.getElementById('scroll-wrap').style.top=(54+sp)+'px';
}

// ── COURT BADGE ───────────────────────────────────────────────────────────
function badge(court,time){
  if(!court&&!time) return '';
  let cls='',lbl='';
  if(court===C_CENTRAL){cls='court-central';lbl='Campo Centrale';}
  else if(court===C_PIETR){cls='court-pietr';lbl='Pietrangeli';}
  else if(court===C_C6){cls='court-c6';lbl='Campo 6';}
  return `<div class="match-meta"><span class="court-badge ${cls}">${lbl}</span>${time?`<span class="match-time">${time}</span>`:''}</div>`;
}

// ── WINNER LOGIC ──────────────────────────────────────────────────────────
function winner(id){
  const p=picks[id]; if(!p) return null;
  const qf=QF.find(m=>m.id===id);
  if(qf) return p==='A'?qf.teamA:qf.teamB;
  if(id==='sf0'){ const a=winner('qf0'),b=winner('qf1'); return p==='A'?a:b; }
  if(id==='sf1'){ const a=winner('qf2'),b=winner('qf3'); return p==='A'?a:b; }
  if(id==='fin'){ const a=winner('sf0'),b=winner('sf1'); return p==='A'?a:b; }
  return null;
}
function clearDown(id){
  const qi=QF.findIndex(m=>m.id===id);
  if(qi!==-1){ const sf=qi<2?'sf0':'sf1'; picks[sf]=null; clearDown(sf); return; }
  if(id==='sf0'||id==='sf1'){ picks.fin=null; }
}
function pick(id,side){
  picks[id]= picks[id]===side?null:side;
  clearDown(id);
  render();
}
function resetAll(){
  QF.forEach(m=>picks[m.id]=null);
  picks.sf0=picks.sf1=picks.fin=null;
  render();
}

// ── ROW BUILDERS ──────────────────────────────────────────────────────────
function tRow(team,side,id,isWin,isElim,isChamp,isTbd,locked){
  if(isTbd||!team) return `<div class="team-row tbd"><span class="team-names"><span class="t-name1">TBD</span></span></div>`;
  const sn=team.seed?`[${team.seed}]`:'';
  const cls=(isChamp?'champion':isWin?'winner':isElim?'eliminated':'')+' '+(locked?'locked':'');
  const cb=`onclick="pick('${id}','${side}')"`;
  const chk=isChamp?`<span class="win-check">★</span><span class="trophy-icon">🏆</span>`:isWin?`<span class="win-check">✓</span>`:'';
  return `<div class="team-row ${cls.trim()}" ${locked?'':cb}>
    <span class="seed-num">${sn}</span>
    <span class="team-names"><span class="t-name1">${team.p1}</span><span class="t-name2">${team.p2}</span></span>
    ${chk}
  </div>`;
}

function r16Card(i){
  const m=R16[i],wA=m.w==='A',wB=m.w==='B';
  const sA=m.teamA.seed?`[${m.teamA.seed}]`:'', sB=m.teamB.seed?`[${m.teamB.seed}]`:'';
  return `<div class="match-card r16-locked">
    ${badge(m.court,m.time)}
    <div class="team-row ${wA?'winner':'eliminated'} locked">
      <span class="seed-num">${sA}</span>
      <span class="team-names"><span class="t-name1">${m.teamA.p1}</span><span class="t-name2">${m.teamA.p2}</span></span>
      ${wA?'<span class="win-check">✓</span>':''}
    </div>
    <div class="team-row ${wB?'winner':'eliminated'} locked">
      <span class="seed-num">${sB}</span>
      <span class="team-names"><span class="t-name1">${m.teamB.p1}</span><span class="t-name2">${m.teamB.p2}</span></span>
      ${wB?'<span class="win-check">✓</span>':''}
    </div>
  </div>`;
}

function qfCard(qf){
  const {id,teamA,teamB,court,time}=qf;
  const p=picks[id],wA=p==='A',wB=p==='B',both=teamA&&teamB;
  return `<div class="match-card">
    ${badge(court,time)}
    ${tRow(teamA,'A',id,wA,wB&&both,false,!teamA,false)}
    ${tRow(teamB,'B',id,wB,wA&&both,false,!teamB,false)}
  </div>`;
}

function sfCard(sfId,tA,tB){
  const p=picks[sfId],wA=p==='A',wB=p==='B',both=tA&&tB;
  return `<div class="match-card">
    ${badge(null,null)}
    ${tRow(tA,'A',sfId,wA,wB&&both,false,!tA,false)}
    ${tRow(tB,'B',sfId,wB,wA&&both,false,!tB,false)}
  </div>`;
}

// ── ZOOM ─────────────────────────────────────────────────────────────────
let zl=1.0;
function zoomBracket(d){
  zl=Math.max(0.5,Math.min(1.6,zl+d));
  const bo=document.getElementById('bracket-outer');
  bo.style.transform=`scale(${zl})`;
  bo.style.transformOrigin='top left';
  document.getElementById('zoom-val').textContent=Math.round(zl*100)+'%';
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  const outer=document.getElementById('bracket-outer');
  outer.innerHTML='';

  function col(lbl,w){
    const c=document.createElement('div');
    c.className='col'; c.style.width=w+'px';
    const l=document.createElement('div'); l.className='col-label'; l.textContent=lbl;
    const i=document.createElement('div'); i.className='col-inner';
    c.appendChild(l); c.appendChild(i);
    return {c,i};
  }
  function gap(w){
    const d=document.createElement('div');
    d.className='connector'; d.style.width=w+'px'; return d;
  }
  function add(inner,html,flex){
    const w=document.createElement('div'); w.className='match-wrap';
    if(flex) w.style.flex='1';
    w.innerHTML=html; inner.appendChild(w);
  }

  const W=190,G=20;
  const tR16=col('Round of 16',W), tQF=col('Quarterfinals',W), tSF=col('Semifinals',W);
  const finWrap=document.createElement('div'); finWrap.className='final-wrap'; finWrap.style.width='200px';
  const finLbl=document.createElement('div'); finLbl.className='final-label'; finLbl.textContent='Final';
  finWrap.appendChild(finLbl);
  const bSF=col('Semifinals',W), bQF=col('Quarterfinals',W), bR16=col('Round of 16',W);

  // TOP R16 locked
  for(let i=0;i<4;i++) add(tR16.i, r16Card(i), false);
  // TOP QF
  add(tQF.i, qfCard(QF[0]), true);
  add(tQF.i, qfCard(QF[1]), true);
  // TOP SF
  add(tSF.i, sfCard('sf0', winner('qf0'), winner('qf1')), false);

  // FINAL
  {
    const tA=winner('sf0'), tB=winner('sf1');
    const champ=picks.fin!==null;
    const fc=document.createElement('div'); fc.className='final-card'+(champ?' has-champ':'');
    const fh=document.createElement('div'); fh.className='final-header'+(champ?' crowned':'');
    fh.textContent=champ?'🏆 Champion':'Final';
    fc.appendChild(fh);
    const p=picks.fin,wA=p==='A',wB=p==='B',both=tA&&tB;
    const rows=document.createElement('div');
    rows.innerHTML=tRow(tA,'A','fin',wA,wB&&both,wA,!tA,false)+tRow(tB,'B','fin',wB,wA&&both,wB,!tB,false);
    fc.appendChild(rows);
    finWrap.appendChild(fc);
  }

  // BOT SF
  add(bSF.i, sfCard('sf1', winner('qf2'), winner('qf3')), false);
  // BOT QF
  add(bQF.i, qfCard(QF[2]), true);
  add(bQF.i, qfCard(QF[3]), true);
  // BOT R16 locked
  for(let i=4;i<8;i++) add(bR16.i, r16Card(i), false);

  outer.appendChild(tR16.c); outer.appendChild(gap(G));
  outer.appendChild(tQF.c);  outer.appendChild(gap(G));
  outer.appendChild(tSF.c);  outer.appendChild(gap(G));
  outer.appendChild(finWrap); outer.appendChild(gap(G));
  outer.appendChild(bSF.c);  outer.appendChild(gap(G));
  outer.appendChild(bQF.c);  outer.appendChild(gap(G));
  outer.appendChild(bR16.c);

  outer.style.transform=`scale(${zl})`;
  outer.style.transformOrigin='top left';
}

window.addEventListener('load',()=>{
  buildSeeds(); render();
  setTimeout(updateTop,60);
});
window.addEventListener('resize', updateTop);
</script>
</body>
</html>
