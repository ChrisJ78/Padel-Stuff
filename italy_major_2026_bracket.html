<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNL Italy Major 2026 — Men's Draw</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0b;--bg2:#1a1a17;--bg3:#232320;
  --text:#e8e6df;--text2:#888780;--text3:#5a5955;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.20);
  --conn:rgba(255,255,255,0.08);
  --win-bg:#0a3d2e;--win-text:#6ee7b7;--win-border:#10b981;
  --elim-bg:#1a1a17;--elim-text:#4a4945;
  --champ-bg:#78350f;--champ-text:#fcd34d;--champ-border:#d97706;
  --tbd-bg:#1a1a17;--tbd-text:#4a4945;
  --lbl:#555450;
}
@media(prefers-color-scheme:light){:root{
  --bg:#f5f4ef;--bg2:#ededea;--bg3:#e4e3de;
  --text:#1a1a18;--text2:#6b6a66;--text3:#9a9995;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --conn:rgba(0,0,0,0.10);
  --win-bg:#064e3b;--win-text:#a7f3d0;--win-border:#059669;
  --elim-bg:#e9e8e3;--elim-text:#9a9995;
  --champ-bg:#78350f;--champ-text:#fde68a;--champ-border:#d97706;
  --tbd-bg:#ededea;--tbd-text:#9a9995;
  --lbl:#9a9995;
}}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
#topbar{
  position:absolute;top:0;left:0;right:0;height:44px;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;gap:10px;z-index:10;
}
#topbar h1{font-size:13px;font-weight:500;white-space:nowrap;color:var(--text)}
.sub{font-size:10px;color:var(--text2);white-space:nowrap}
#legend{display:flex;gap:10px;align-items:center}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
#reset-btn{
  font-size:10px;padding:3px 10px;cursor:pointer;
  background:transparent;border:1px solid var(--border2);
  border-radius:5px;color:var(--text2);font-family:inherit;flex-shrink:0;
  white-space:nowrap;
}
#reset-btn:hover{background:var(--bg2)}
#canvas-wrap{
  position:absolute;top:44px;left:0;right:0;bottom:0;
  overflow:hidden;
}
canvas{display:block;cursor:default}
#champ-banner{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:var(--champ-bg);color:var(--champ-text);
  border:1px solid var(--champ-border);border-radius:7px;
  padding:5px 16px;font-size:12px;font-weight:500;
  display:none;z-index:20;white-space:nowrap;pointer-events:none;
}
#tooltip{
  position:fixed;pointer-events:none;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:4px;padding:3px 8px;
  font-size:10px;color:var(--text);
  white-space:nowrap;display:none;z-index:30;
}
</style>
</head>
<body>
<div id="topbar">
  <div style="display:flex;flex-direction:column;gap:1px">
    <h1>BNL Italy Major 2026 — Men's Draw</h1>
    <p class="sub">R32 · 3 Jun 2026 · click a team to advance</p>
  </div>
  <div id="legend">
    <div class="li"><div class="ld" style="background:#10b981"></div>Advanced</div>
    <div class="li"><div class="ld" style="background:var(--elim-bg);border:1px solid var(--border)"></div>Eliminated</div>
    <div class="li"><div class="ld" style="background:#d97706"></div>Champion</div>
  </div>
  <button id="reset-btn">↺ Reset</button>
</div>
<div id="canvas-wrap"><canvas id="bc"></canvas></div>
<div id="champ-banner"></div>
<div id="tooltip"></div>

<script>
// ── R32 draw — from official PDF, 3 Jun 2026 ──
// [teamA, teamB, result]  "A"|"B"|null
const L32 = [
  ["TAPIA/COELLO (1)",        "ABBATE/MONTIEL",          null],
  ["GALA/JENSEN",             "GARCIA/JIMENEZ (13)",     null],
  ["ESBRI/RUIZ (11)",         "CABEZA/GONZALEZ",         null],
  ["SINTES/SANTIGOSA",        "GARRIDO/BERGAMINI (8)",   null],
  ["DI NENNO/NAVARRO (6)",    "RODRIGUEZ/DE PASCUAL",    null],
  ["FERNANDEZ/CAPRA",         "ALONSO/GOÑI (10)",        null],
  ["GONZALEZ/CAMPAGNOLO (9)", "RUIZ/ORTEGA",             null],
  ["CASTAÑO/GIL",             "YANGUAS/STUPACZUK (3)",   null],
];
const R32 = [
  ["LEBRON/AUGSBURGER (4)",   "ARAGON/ROGLAN",           null],
  ["VILARIÑO/DEL CASTILLO",   "AGUIRRE/ARROYO (12)",     null],
  ["ARCE/TELLO (15)",         "TORRE/CEPERO",            null],
  ["HERNANDEZ/MARTINEZ",      "SANZ/NIETO (5)",          null],
  ["LEAL/GUERRERO (7)",       "COLLADO/HERNANDEZ",       null],
  ["MELENDEZ/GONZALEZ",       "BAUTISTA/JOFRE (14)",     null],
  ["BARAHONA/ALFONSO (16)",   "DOMINGUEZ/ZAPATA",        null],
  ["LIBAAK/CHOZAS",           "GALAN/CHINGOTTO (2)",     null],
];

// State arrays — 4 levels each side
// lW[0] = R32 winners (8), lW[1] = R16 winners (4), lW[2] = QF winners (2), lW[3] = SF winners (1)
let lW, rW, finW, elim;

function init() {
  lW = [Array(8).fill(null), Array(4).fill(null), Array(2).fill(null), Array(1).fill(null)];
  rW = [Array(8).fill(null), Array(4).fill(null), Array(2).fill(null), Array(1).fill(null)];
  finW = null; elim = new Set();
  L32.forEach(([a,b,w],i)=>{ if(w){const wn=w==='A'?a:b;elim.add(w==='A'?b:a);lW[0][i]=wn;}});
  R32.forEach(([a,b,w],i)=>{ if(w){const wn=w==='A'?a:b;elim.add(w==='A'?b:a);rW[0][i]=wn;}});
}

function clearDown(side,r,idx){
  if(r>3){finW=null;return;}
  const arr=side==='L'?lW:rW;
  if(!arr[r])return;
  const old=arr[r][idx];arr[r][idx]=null;
  if(old)elim.delete(old);
  clearDown(side,r+1,Math.floor(idx/2));
}
function gW(side,r,i){return(side==='L'?lW:rW)[r]?.[i]??null;}
function sW(side,r,i,v){(side==='L'?lW:rW)[r][i]=v;}

function advR32(side,i,a,b,winner){
  const loser=winner===a?b:a,prev=gW(side,0,i);
  if(prev&&prev!==winner)elim.add(prev);
  sW(side,0,i,winner);elim.add(loser);
  clearDown(side,1,Math.floor(i/2));
  draw();
}
function adv(side,r,slot,winner,loser){
  const prev=gW(side,r,slot);
  if(prev&&prev!==winner)elim.add(prev);
  sW(side,r,slot,winner);if(loser)elim.add(loser);
  clearDown(side,r+1,Math.floor(slot/2));
  draw();
}
function crownChamp(w,l){finW=w;if(l)elim.add(l);draw();}

// ── Canvas layout ──
const canvas=document.getElementById('bc');
const ctx=canvas.getContext('2d');
let W,H,hitAreas=[];

// 9 columns: 4 left (R32,R16,QF,SF) + 1 centre (Final) + 4 right
// 8 match rows per half
const NCOLS=9, NROWS=8;
let colW, rowH, BW, BH, GAP;

function resize(){
  const wrap=document.getElementById('canvas-wrap');
  W=wrap.clientWidth; H=wrap.clientHeight;
  canvas.width=W; canvas.height=H;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  colW=W/NCOLS; rowH=H/NROWS;
  BW=colW*0.84; BH=rowH*0.36; GAP=rowH*0.06;
  draw();
}

// Column x for left side (col 0=R32, 1=R16, 2=QF, 3=SF) and right (mirrored)
function cx(side,r){
  return side==='L' ? r*colW + colW*0.08 : W-(r+1)*colW + colW*0.08;
}

// Match vertical centre: for display round r (0=R32,1=R16,2=QF,3=SF), match index i
// R32: 8 matches in 8 rows → match i at row i+0.5
// R16: 4 matches, each spans 2 rows → match i at row i*2+1
// QF:  2 matches, each spans 4 rows → match i at row i*4+2
// SF:  1 match, spans 8 rows → at row 4
function mcy(r,i){
  const span=Math.pow(2,r);
  return (i*span*2 + span)*rowH;
}
function mtop(r,i){return mcy(r,i)-BH-GAP/2;}

// ── Theme colours ──
function cv(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function C(){return{
  bg:cv('--bg'),bg2:cv('--bg2'),bg3:cv('--bg3'),
  text:cv('--text'),text2:cv('--text2'),text3:cv('--text3'),
  border:cv('--border'),lbl:cv('--lbl'),conn:cv('--conn'),
  wBg:cv('--win-bg'),wTx:cv('--win-text'),wBd:cv('--win-border'),
  eBg:cv('--elim-bg'),eTx:cv('--elim-text'),
  cBg:cv('--champ-bg'),cTx:cv('--champ-text'),cBd:cv('--champ-border'),
  tBg:cv('--tbd-bg'),tTx:cv('--tbd-text'),
};}

function boxStyle(team, isWinner, c){
  if(!team)          return{bg:c.tBg,tc:c.tTx,bc:c.border,lbl:'TBD'};
  if(finW===team)    return{bg:c.cBg,tc:c.cTx,bc:c.cBd,   lbl:team};
  if(isWinner)       return{bg:c.wBg,tc:c.wTx,bc:c.wBd,   lbl:team};
  if(elim.has(team)) return{bg:c.eBg,tc:c.eTx,bc:c.border, lbl:team,s:1};
  return{bg:c.bg,tc:c.text,bc:c.border,lbl:team};
}

function drawBox(x,y,w,h,st){
  ctx.fillStyle=st.bg;
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();
  ctx.strokeStyle=st.bc;ctx.lineWidth=0.6;
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.stroke();
  const fs=Math.max(6.5,h*0.46);
  ctx.font=`400 ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
  ctx.fillStyle=st.tc;ctx.textAlign='center';ctx.textBaseline='middle';
  let lbl=st.lbl,maxW=w-8;
  while(ctx.measureText(lbl).width>maxW&&lbl.length>3)lbl=lbl.slice(0,-1);
  if(lbl!==st.lbl)lbl+='…';
  ctx.fillText(lbl,x+w/2,y+h/2);
  if(st.s){ctx.strokeStyle=st.tc;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x+5,y+h/2);ctx.lineTo(x+w-5,y+h/2);ctx.stroke();}
}

function drawConnectors(c){
  ctx.strokeStyle=c.conn;ctx.lineWidth=0.7;
  ['L','R'].forEach(side=>{
    // Between display rounds 0→1, 1→2, 2→3
    for(let dr=1;dr<=3;dr++){
      const nOut=Math.pow(2,4-dr); // matches in source round
      const nIn=nOut/2;
      for(let i=0;i<nIn;i++){
        const y1=mcy(dr-1,i*2);   // centre of match i*2 in prev round (bottom box = winner slot)
        const y2=mcy(dr-1,i*2+1); // centre of match i*2+1
        const yd=mcy(dr,i);        // centre of destination match
        const xExit=side==='L'?cx(side,dr-1)+BW:cx(side,dr-1);
        const xStep=side==='L'?xExit+colW*0.06:xExit-colW*0.06;
        const xEnter=side==='L'?cx(side,dr):cx(side,dr)+BW;
        const ymid=(y1+y2)/2;
        ctx.beginPath();
        ctx.moveTo(xExit,y1);ctx.lineTo(xStep,y1);
        ctx.lineTo(xStep,ymid);ctx.lineTo(xEnter,yd);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(xExit,y2);ctx.lineTo(xStep,y2);
        ctx.lineTo(xStep,ymid);
        ctx.stroke();
      }
    }
    // SF → Final
    const sfCY=mcy(3,0);
    const sfXExit=side==='L'?cx(side,3)+BW:cx(side,3);
    const finCX=W/2, finCY=H/2;
    ctx.beginPath();ctx.moveTo(sfXExit,sfCY);ctx.lineTo(finCX,finCY);ctx.stroke();
  });
}

function drawLabels(c){
  const lbls=['R32','R16','QF','SF'];
  const fs=Math.max(8,colW*0.11);
  ctx.fillStyle=c.lbl;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`500 ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
  for(let r=0;r<4;r++){
    const y=Math.max(10,mtop(r,0)-6);
    ctx.fillText(lbls[r],cx('L',r)+BW/2,y);
    ctx.fillText(lbls[r],cx('R',r)+BW/2,y);
  }
  ctx.fillText('FINAL',W/2,H/2-BH*1.1-8);
}

function draw(){
  const c=C();
  ctx.clearRect(0,0,W,H);
  hitAreas=[];
  drawConnectors(c);
  drawLabels(c);

  // ── R32 (display col 0) ──
  ['L','R'].forEach(side=>{
    const raw=side==='L'?L32:R32;
    raw.forEach(([a,b,w],i)=>{
      const x=cx(side,0),top=mtop(0,i);
      const r32w=gW(side,0,i); // who won this R32 match (advances to R16)
      const sa=boxStyle(a,r32w===a,c);
      const sb=boxStyle(b,r32w===b,c);
      drawBox(x,top,       BW,BH,sa);
      drawBox(x,top+BH+GAP,BW,BH,sb);
      if(!w){
        hitAreas.push({x,y:top,       w:BW,h:BH,label:a,fn:()=>advR32(side,i,a,b,a)});
        hitAreas.push({x,y:top+BH+GAP,w:BW,h:BH,label:b,fn:()=>advR32(side,i,a,b,b)});
      }
    });
  });

  // ── R16(col1), QF(col2), SF(col3) ──
  // Display col dr uses contenders from state round dr-1 (pairs i*2,i*2+1)
  // and winners from state round dr
  ['L','R'].forEach(side=>{
    const arr=side==='L'?lW:rW;
    for(let dr=1;dr<=3;dr++){
      const nm=Math.pow(2,3-dr); // R16=4,QF=2,SF=1
      for(let i=0;i<nm;i++){
        const teamA=arr[dr-1][i*2]  ??null;
        const teamB=arr[dr-1][i*2+1]??null;
        const winner=arr[dr][i]??null;
        const x=cx(side,dr),top=mtop(dr,i);
        const sa=boxStyle(teamA,winner===teamA&&!!winner,c);
        const sb=boxStyle(teamB,winner===teamB&&!!winner,c);
        drawBox(x,top,       BW,BH,sa);
        drawBox(x,top+BH+GAP,BW,BH,sb);
        if(teamA)hitAreas.push({x,y:top,       w:BW,h:BH,label:teamA,fn:()=>adv(side,dr,i,teamA,teamB)});
        if(teamB)hitAreas.push({x,y:top+BH+GAP,w:BW,h:BH,label:teamB,fn:()=>adv(side,dr,i,teamB,teamA)});
      }
    }
  });

  // ── Final ──
  const lSF=gW('L',3,0),rSF=gW('R',3,0);
  const fw=BW*1.2,fh=BH*1.15;
  const fx=W/2-fw/2,fy=H/2-fh-GAP/2;
  const sL=lSF&&finW===lSF?{bg:c.cBg,tc:c.cTx,bc:c.cBd,lbl:lSF}:boxStyle(lSF,false,c);
  const sR=rSF&&finW===rSF?{bg:c.cBg,tc:c.cTx,bc:c.cBd,lbl:rSF}:boxStyle(rSF,false,c);
  drawBox(fx,fy,       fw,fh,lSF?sL:{bg:c.tBg,tc:c.tTx,bc:c.border,lbl:'TBD'});
  drawBox(fx,fy+fh+GAP,fw,fh,rSF?sR:{bg:c.tBg,tc:c.tTx,bc:c.border,lbl:'TBD'});
  if(lSF)hitAreas.push({x:fx,y:fy,       w:fw,h:fh,label:lSF,fn:()=>crownChamp(lSF,rSF)});
  if(rSF)hitAreas.push({x:fx,y:fy+fh+GAP,w:fw,h:fh,label:rSF,fn:()=>crownChamp(rSF,lSF)});

  // Champion label
  const bn=document.getElementById('champ-banner');
  if(finW){bn.textContent='🥇 Champion: '+finW;bn.style.display='block';}
  else bn.style.display='none';
}

// ── Interaction ──
const tip=document.getElementById('tooltip');
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const sx=W/r.width,sy=H/r.height;
  const mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
  for(let i=hitAreas.length-1;i>=0;i--){
    const h=hitAreas[i];
    if(mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h){h.fn();return;}
  }
});
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const sx=W/r.width,sy=H/r.height;
  const mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
  let f=null;
  for(let i=hitAreas.length-1;i>=0;i--){
    const h=hitAreas[i];
    if(mx>=h.x&&mx<=h.x+h.w&&my>=h.y&&my<=h.y+h.h){f=h;break;}
  }
  if(f){canvas.style.cursor='pointer';tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-28)+'px';tip.textContent='Advance '+f.label;}
  else{canvas.style.cursor='default';tip.style.display='none';}
});
canvas.addEventListener('mouseleave',()=>tip.style.display='none');
document.getElementById('reset-btn').addEventListener('click',()=>{init();draw();});

let _rt;
window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(resize,80);});
init();
resize();
</script>
</body>
</html>
